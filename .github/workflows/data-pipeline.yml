# ============================================================================
# GitHub Actions Workflow: Data Processing Pipeline (简化版)
# ============================================================================

name: Data Processing Pipeline

on:
  push:
    paths:
      - 'data/**'
    branches:
      - main
      - master

jobs:
  clean-and-merge:
    name: Process and Update Database
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Step 2: 设置Python环境
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # Step 3: 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: 运行数据处理脚本
      - name: Run clean_and_merge script
        run: python clean_and_merge.py

      # Step 5: 上传数据库作为产物（可选步骤）
      - name: Upload database as artifact
        uses: actions/upload-artifact@v4
        with:
          name: orders-database
          path: data/orders.db
          retention-days: 30
        continue-on-error: true  # 如果这步失败，不影响整体

      # Step 6: 提交更新后的数据库（简化版，只处理最基本的情况）
      - name: Commit updated database
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          # 检查是否有更改
          if git diff --quiet data/orders.db; then
            echo "No changes to database, skipping commit"
          else
            git add data/orders.db
            git commit -m "Update database [skip ci]"
            git push origin HEAD:main || echo "Push failed, but script ran successfully"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # 如果提交失败，仍然标记为成功
