# ============================================================================
# GitHub Actions Workflow: Data Processing Pipeline
# ============================================================================

# Workflow名称，会在GitHub Actions界面显示
name: Data Processing Pipeline

# ============================================================================
# 触发条件 (Triggers)
# ============================================================================
on:
  push:
    # 只当data文件夹中的任何文件被推送时才触发
    paths:
      - 'data/**'
    # 只在main或master分支上触发
    branches:
      - main
      - master

# ============================================================================
# Jobs (作业/任务定义)
# ============================================================================
jobs:
  # ============================================================================
  # Job 1: 数据清洗和合并
  # ============================================================================
  clean-and-merge:
    name: Process and Update Database
    # 运行在最新的Ubuntu环境
    runs-on: ubuntu-latest
    
    # ============================================================================
    # Steps (步骤)
    # ============================================================================
    steps:
      # ------------------------------------------------------------------------
      # Step 1: 检出代码
      # 使用GitHub官方的checkout action获取仓库代码
      # ------------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Step 2: 设置Python环境
      # 安装Python 3.12，并启用pip缓存以加速后续安装
      # ------------------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ------------------------------------------------------------------------
      # Step 3: 安装Python依赖
      # 升级pip，安装pandas和requirements.txt中的所有依赖
      # ------------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ------------------------------------------------------------------------
      # Step 4: 运行数据处理脚本
      # 执行clean_and_merge.py，它会：
      #   - 读取所有订单CSV文件
      #   - 去除重复订单
      #   - 将所有金额转换为CNY
      #   - 合并订单和客户数据
      #   - 创建区域汇总表
      #   - 更新SQLite数据库
      # ------------------------------------------------------------------------
      - name: Run clean_and_merge script
        run: python clean_and_merge.py

      # ------------------------------------------------------------------------
      # Step 5: 上传数据库作为构建产物
      # 将更新后的数据库文件保存30天，方便下载和检查
      # ------------------------------------------------------------------------
      - name: Upload database as artifact
        uses: actions/upload-artifact@v4
        with:
          name: orders-database
          path: data/orders.db
          retention-days: 30

      # ------------------------------------------------------------------------
      # Step 6: 提交更新后的数据库回仓库
      # 配置Git用户信息，添加更新的数据库文件并推送
      # 使用[skip ci]标签避免触发新的工作流运行
      # ------------------------------------------------------------------------
      - name: Commit updated database
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/orders.db
          git diff --staged --quiet || git commit -m "Update database after data changes [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
